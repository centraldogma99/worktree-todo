<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>Worktree Todo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="popup">
      <header class="popup__header">
        <input
          type="search"
          id="filter"
          class="popup__filter"
          placeholder="Filter worktrees…"
          autofocus
        />
        <button
          type="button"
          id="add-repo"
          class="popup__add"
          aria-label="Add repository"
          title="Add repository"
        >+</button>
      </header>
      <main id="content" class="popup__content" tabindex="-1"></main>
      <div
        id="toast"
        class="toast"
        role="status"
        aria-live="polite"
        hidden
      ></div>
      <div
        id="modal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        hidden
      >
        <div class="modal__backdrop" data-modal-dismiss></div>
        <div class="modal__panel">
          <h2 id="modal-title" class="modal__title"></h2>
          <p id="modal-body" class="modal__body"></p>
          <div class="modal__actions" id="modal-actions"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
